name: Full CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  schema-validation:
    name: Schema Consistency Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic sqlalchemy

    - name: Validate Pydantic schemas
      run: |
        python3 << 'EOF'
        import ast
        import sys
        
        # Read and parse backend schemas
        with open('backend/app/schemas/schemas.py', 'r') as f:
            backend_schemas = f.read()
        
        try:
            ast.parse(backend_schemas)
            print("✓ Backend schemas are syntactically valid")
        except SyntaxError as e:
            print(f"✗ Syntax error in backend schemas: {e}")
            sys.exit(1)
        
        # Read and parse TypeScript interfaces (basic validation)
        with open('frontend/app/interview/room/[id]/page.tsx', 'r') as f:
            frontend_interfaces = f.read()
        
        if 'interface' in frontend_interfaces or 'type' in frontend_interfaces:
            print("✓ Frontend TypeScript interfaces validated")
        else:
            print("! No TypeScript interfaces found in sample file")
        EOF

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: schema-validation
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov black flake8

    - name: Lint with flake8
      run: |
        cd backend
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Format check with black
      run: |
        cd backend
        black --check app/ 2>/dev/null || echo "Run 'black app/' to format code"
      continue-on-error: true

    - name: Run Backend Tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        GEMINI_API_KEY: test_key
        SECRET_KEY: test_secret
      run: |
        cd backend
        pytest tests/ -v

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: schema-validation
    
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'frontend/package.json'

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Lint with ESLint
      run: |
        cd frontend
        npm run lint

    - name: TypeScript type check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Build Next.js
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
      run: |
        cd frontend
        npm run build
        echo "✓ Frontend build successful"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for security scanning

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified
      continue-on-error: true

    - name: Check requirements.txt for vulnerabilities
      run: |
        python -m pip install --upgrade pip
        pip install safety
        cd backend
        safety check -r requirements.txt || true
      continue-on-error: true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [schema-validation, backend-tests, frontend-tests, security-scan]
    if: always()
    
    steps:
    - name: Check CI Status
      run: |
        echo "✓ CI Pipeline completed"
        echo "Schema validation: ${{ needs.schema-validation.result }}"
        echo "Backend tests: ${{ needs.backend-tests.result }}"
        echo "Frontend tests: ${{ needs.frontend-tests.result }}"
        echo "Security scan: ${{ needs.security-scan.result }}"
