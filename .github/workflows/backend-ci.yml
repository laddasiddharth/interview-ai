name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint black flake8

    - name: Lint with pylint
      run: |
        cd backend
        pylint app/ --errors-only

    - name: Format check with black
      run: |
        cd backend
        black --check app/

    - name: Lint with flake8
      run: |
        cd backend
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Type checking (optional - requires additional setup)
      run: |
        cd backend
        pip install mypy
        mypy app/ --ignore-missing-imports || true
      continue-on-error: true

    - name: Run pytest
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        GEMINI_API_KEY: test_key
        SECRET_KEY: test_secret
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
      continue-on-error: true

    - name: Check schema consistency
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        GEMINI_API_KEY: test_key
        SECRET_KEY: test_secret
      run: |
        cd backend
        python -c "
        import sys
        from app.schemas.schemas import *
        from app.models.models import *
        print('✓ Schema definitions are syntactically valid')
        " || exit 1
